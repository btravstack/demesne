autoInstallPeers: false
dedupePeerDependents: true
engineStrict: true
saveExact: true
strictPeerDependencies: true

packages:
  - packages/*
  - tools/*
  - examples/*
  - docs

catalog:
  "@arethetypeswrong/cli": 0.18.5
  "@btravstack/theme": 1.7.0
  "@changesets/cli": 2.31.0
  "@commitlint/cli": 21.2.1
  "@commitlint/config-conventional": 21.2.0
  "@hono/node-server": 2.0.8
  "@orpc/client": 2.0.0-beta.16
  "@orpc/contract": 2.0.0-beta.16
  "@orpc/server": 2.0.0-beta.16
  "@prisma/adapter-pg": 7.8.0
  "@prisma/client": 7.8.0
  "@types/node": 26.1.1
  "@unthrown/orpc": 0.1.0
  "@unthrown/prisma": 0.1.0
  "@unthrown/vitest": 4.1.0
  "@vitest/coverage-v8": 4.1.10
  hono: 4.12.30
  knip: 6.26.0
  lefthook: 2.1.10
  oxfmt: 0.58.0
  oxlint: 1.73.0
  prisma: 7.8.0
  publint: 0.3.21
  tsdown: 0.22.7
  tsx: 4.23.1
  turbo: 2.10.5
  typedoc: 0.28.20
  typedoc-plugin-markdown: 4.12.0
  typescript: 6.0.3
  unthrown: 4.1.0
  vitepress: 1.6.4
  vitest: 4.1.10
  zod: 4.4.3

peerDependencyRules:
  ignoreMissing:
    # Optional analytics peer of VitePress's bundled Algolia DocSearch.
    - search-insights
    # React peers of `@prisma/studio-core` (and the radix-ui internals it pulls in),
    # brought in transitively by the `prisma` CLI (v7 bundles Prisma Studio). We never
    # run `prisma studio`, so its GUI's React peers are irrelevant to the example.
    - react
    - react-dom
    - "@types/react"

allowBuilds:
  "@prisma/engines": false
  esbuild: true
  lefthook: true
  prisma: true

overrides:
  # Force patched versions of vulnerable transitive dependencies. Each override
  # uses a scoped selector so only the affected version line moves; unrelated
  # lines resolved elsewhere are left untouched. Every advisory below reaches us
  # only through dev/build tooling (never a published package's runtime deps).
  # GHSA-fx2h-pf6j-xcff / GHSA-v6wh-96g9-6wx3 / GHSA-4w7w-66w2-5vf9: vite
  # `server.fs.deny` bypass and related dev-server issues (docs-only; the docs
  # ship as static HTML). Reaches us via docs > vitepress > vite. vitepress 1.6.x
  # pins vite ^5.4.14 with no patched 5.x release, so pull vite up to 6.4.3 (the
  # first fixed version) — the docs `vitepress build` is verified against it. This
  # also drags esbuild up to a patched 0.25.x (GHSA-67mh-4wv8-2f99).
  vite: 6.4.3
  # GHSA-92pp-h63x-v22m: @hono/node-server request smuggling in the 1.x line,
  # pulled in by the `prisma` CLI's dev server (@prisma/dev). 1.19.13 is the
  # patched 1.x release. (The direct `@hono/node-server` catalog dep is 2.x.)
  "@hono/node-server@1": "1.19.13"

# Supply-chain maturity delay: don't adopt a freshly published version until it
# has been on the registry for 7 days (10080 minutes). Strict mode also validates
# the committed lockfile against this cutoff, so a same-day-published transitive
# dep fails the check instead of slipping in silently. Trade-off: a `--frozen-lockfile`
# CI install can fail if a *locked* dep was (re)published inside the window — mitigated
# by the exclude list below plus Dependabot's `cooldown` in .github/dependabot.yml.
minimumReleaseAge: 10080
minimumReleaseAgeStrict: true
# `unthrown` is demesne's own peer dependency and ships from the sibling repo on the
# same cadence; a fresh release (e.g. the current 3.x) can be newer than the 7-day
# window. Exclude it from the maturity delay so the peer resolves, while the delay
# still guards everything else. `@unthrown/prisma` and `@unthrown/orpc` (the example's
# bridges) ship from the same sibling repo; `@btravstack/theme` (docs) is excluded for
# the same reason.
minimumReleaseAgeExclude:
  - unthrown
  - "@unthrown/prisma"
  - "@unthrown/orpc"
  - "@unthrown/vitest"
  - "@btravstack/theme"
